<body>
    <h1 style="text-align: center;" >Student Registration</h1>
<div class="container">
    <fieldset>
            <legend>Application form</legend>

            <div>
                <label for="First name">First name</label>
        <input style="border-radius: 50px;" type="text" placeholder="First Name">
        
            </div>
            
           <div>
                <label for="">Last name</label>
                <input style="border-radius: 50px;" type="text" placeholder="Last Name">
        
           </div> 

            <div>
                <label for="">Date of birth</label>
                <input style="border-radius: 50px; type="date" placeholder="DOB">
        
           </div> 

        <h4>email</h4>
        <input style="border-radius: 50px; type="email" placeholder="name@example.con">

        <h4>Mobile Number</h4>
        <input style="border-radius: 50px; type="tel" placeholder="Mobile Number">

        <h4>Are you above 18 years old?</h4>
        <input type="checkbox">
        <br>
        <br>

        <input type="button" value="Submit">
        <input type="reset">

    </fieldset>
</div>
